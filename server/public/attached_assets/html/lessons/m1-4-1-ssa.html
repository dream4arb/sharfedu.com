<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار درس النسبة - الصف الأول المتوسط</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header Section -->
    <div class="container mx-auto px-4 pt-8">
        <header class="bg-blue-600 text-white rounded-3xl shadow-lg p-8 mb-10 text-center">
            <h1 class="text-2xl md:text-3xl font-bold">اختبار درس النسبة</h1>
            <p class="mt-2 opacity-90">الرياضيات - الصف الأول المتوسط</p>
        </header>

        <!-- Quiz Container -->
        <div id="quiz-container" class="max-w-3xl mx-auto space-y-8">
            <!-- Questions will be injected here -->
        </div>

        <!-- Result Section -->
        <div id="final-result" class="max-w-3xl mx-auto mt-12 hidden">
            <div class="bg-white rounded-3xl shadow-xl p-10 text-center border-t-8 border-blue-600">
                <h2 class="text-2xl font-bold mb-4">النتيجة النهائية</h2>
                <div id="score-display" class="text-6xl font-black text-blue-600 mb-4">0 / 5</div>
                <p id="result-message" class="text-xl text-gray-700 mb-6"></p>
                <button onclick="window.location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">إعادة الاختبار</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-12 text-gray-500 text-sm">
        تم تطوير هذه الأسئلة بالـ ai ليكون مساعد تفاعلي ولا يغني عن الكتاب المدرسي
    </footer>

    <script>
        const data = {
            title: "النسبة والنسب المتكافئة",
            questions: [
                {
                    question: "في وصفة توابل، تُستخدم ٤ ملاعق من مسحوق الليمون المجفف و ٦ ملاعق من الكزبرة. ما هي نسبة مسحوق الليمون إلى الكزبرة في أبسط صورة؟",
                    options: [
                        "٢ : ٣",
                        "٣ : ٢",
                        "٤ : ٦",
                        "١ : ٢"
                    ],
                    correctIndex: 0,
                    explanation: "بقسمة حدي النسبة ٤ و ٦ على القاسم المشترك الأكبر (٢)، نحصل على النسبة المبسطة ٢ : ٣."
                },
                {
                    question: "في مدرسة الملك فهد، نسبة الطلاب إلى المعلمين هي ٣٩٦ طالباً إلى ٢٢ معلماً. اكتب هذه النسبة في صورة كسر مقامه ١.",
                    options: [
                        "١١ / ١",
                        "١٨ / ١",
                        "٢٢ / ١",
                        "٣٩٦ / ٢٢"
                    ],
                    correctIndex: 1,
                    explanation: "عند قسمة ٣٩٦ على ٢٢، نحصل على ١٨. لذا النسبة هي ١٨ طالباً لكل معلم واحد."
                },
                {
                    question: "حدد أي من النسب التالية تكافئ النسبة (٢٥٠ كلم في ٤ ساعات):",
                    options: [
                        "١٢٥ كلم في ساعة واحدة",
                        "٣٠٠ كلم في ٥ ساعات",
                        "٥٠٠ كلم في ٨ ساعات",
                        "٤٠٠ كلم في ٦ ساعات"
                    ],
                    correctIndex: 2,
                    explanation: "النسبتان متكافئتان لأن ٥٠٠ / ٨ تبسط إلى ١٢٥ / ٤، وكذلك ٢٥٠ / ٤ تبسط إلى ١٢٥ / ٢. أو بضرب حدي النسبة الأولى في ٢ نحصل على النسبة الثانية."
                },
                {
                    question: "تشترط إدارة أحد المسابح وجود ٣ منقذين لكل ٢٠ سباحاً. إذا كان هناك ٦٠ سباحاً و ٩ منقذين، فهل يتفق هذا مع الشرط؟",
                    options: [
                        "نعم، لأن النسبتين متكافئتان",
                        "لا، لأن عدد المنقذين قليل",
                        "لا، لأن عدد السباحين كبير جداً",
                        "نعم، لأن عدد المنقذين أكثر من المطلوب"
                    ],
                    correctIndex: 0,
                    explanation: "بضرب ٣/٢٠ في ٣ للبسط والمقام، نحصل على ٩/٦٠، إذاً العدد يتفق تماماً مع الشرط."
                },
                {
                    question: "في رحلة ميدانية، كان هناك ٢٤ ولي أمر و ١٨٠ طالباً. ما نسبة عدد أولياء الأمور إلى عدد الطلاب في أبسط صورة؟",
                    options: [
                        "٦ : ٤٥",
                        "٢ : ١٥",
                        "١ : ٧",
                        "٤ : ٣٠"
                    ],
                    correctIndex: 1,
                    explanation: "بقسمة ٢٤ و ١٨٠ على القاسم المشترك الأكبر وهو ١٢، نجد أن ٢٤ ÷ ١٢ = ٢ و ١٨٠ ÷ ١٢ = ١٥. فتصبح النسبة ٢ : ١٥."
                }
            ]
        };

        let answersCount = 0;
        let correctCount = 0;

        function initQuiz() {
            const container = document.getElementById('quiz-container');
            data.questions.forEach((q, qIndex) => {
                const qCard = document.createElement('div');
                qCard.className = "bg-white rounded-2xl shadow-md p-6 border-t-4 border-blue-500 transition-all";
                qCard.innerHTML = `
                    <p class="text-lg font-bold text-gray-800 mb-4">${qIndex + 1}. ${q.question}</p>
                    <div class="grid grid-cols-1 gap-3" id="options-${qIndex}">
                        ${q.options.map((opt, optIndex) => `
                            <button onclick="checkAnswer(${qIndex}, ${optIndex})" 
                                    class="option-btn text-right p-4 rounded-xl border-2 border-gray-100 hover:border-blue-200 hover:bg-blue-50 transition-all duration-200">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="explanation-${qIndex}" class="mt-4 p-4 bg-amber-50 rounded-xl text-amber-900 hidden">
                        <p class="font-bold mb-1 text-sm">تفسير:</p>
                        <p class="text-sm">${q.explanation}</p>
                    </div>
                `;
                container.appendChild(qCard);
            });
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const question = data.questions[qIndex];
            const optionsContainer = document.getElementById(`options-${qIndex}`);
            const buttons = optionsContainer.getElementsByTagName('button');
            const explanationBox = document.getElementById(`explanation-${qIndex}`);
            
            Array.from(buttons).forEach(btn => btn.disabled = true);

            if (optIndex === question.correctIndex) {
                buttons[optIndex].classList.remove('border-gray-100', 'hover:bg-blue-50');
                buttons[optIndex].classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                correctCount++;
            } else {
                buttons[optIndex].classList.remove('border-gray-100', 'hover:bg-blue-50');
                buttons[optIndex].classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                buttons[question.correctIndex].classList.add('bg-green-100', 'border-green-500');
            }

            explanationBox.classList.remove('hidden');
            answersCount++;

            if (answersCount === data.questions.length) {
                showFinalResult();
            }
        };

        function showFinalResult() {
            const resultSection = document.getElementById('final-result');
            const scoreDisplay = document.getElementById('score-display');
            const resultMessage = document.getElementById('result-message');
            
            resultSection.classList.remove('hidden');
            scoreDisplay.innerText = `${correctCount} / ${data.questions.length}`;

            const percentage = (correctCount / data.questions.length) * 100;
            if (percentage === 100) {
                resultMessage.innerText = "ممتاز! لقد أتقنت درس النسبة ببراعة.";
            } else if (percentage >= 70) {
                resultMessage.innerText = "جيد جداً! لديك فهم قوي للمادة.";
            } else {
                resultMessage.innerText = "محاولة جيدة! ننصح بمراجعة الدرس مرة أخرى لتعزيز فهمك.";
            }

            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        initQuiz();
    </script>
</body>
</html>
